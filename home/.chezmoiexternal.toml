{{ if .personal -}}
[".dotfiles"]
    type = "git-repo"
     {{ if eq .wm "awm-m3" -}}
    url = "https://github.com/szorfein/dotfiles-awesome-m3"
    {{ else if eq .wm "awm-m2" -}}
    url = "https://github.com/szorfein/dotfiles-awesome"
    {{ else -}}
    url = "https://github.com/szorfein/dotfiles"
    {{ end -}}
    refreshPeriod = "0"
[".ansible/collections/ansible_collections/szorfein/hardening"]
    type = "git-repo"
    url = "https://github.com/szorfein/ansible-collection-hardening"
    refreshPeriod = "0"
[".ansible/collections/ansible_collections/szorfein/privacy"]
    type = "git-repo"
    url = "https://github.com/szorfein/ansible-collection-privacy"
    refreshPeriod = "0"
[".ansible/collections/ansible_collections/szorfein/desktop"]
    type = "git-repo"
    url = "https://github.com/szorfein/ansible-collection-desktop"
    refreshPeriod = "0"
{{ else -}}
[".dotfiles"]
    type = "archive"
    {{ if eq .wm "awm-m2" -}}
    url = "https://github.com/szorfein/dotfiles-awesome/archive/refs/heads/main.tar.gz"
    {{ else if eq .wm "awm-m3" -}}
    url = "https://github.com/szorfein/dotfiles-awesome-m3/archive/refs/heads/main.tar.gz"
    {{ else -}}
    url = "https://github.com/szorfein/dotfiles/archive/refs/heads/main.tar.gz"
    {{ end -}}
    exact = true
    stripComponents = 1
    refreshPeriod = "168h"
{{ end -}}
